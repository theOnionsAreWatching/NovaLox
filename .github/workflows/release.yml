name: Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # secrets can't be referenced in `if:` expressions directly,
      # but they CAN be evaluated into env vars — check the env var instead
      HAS_SIGNING: ${{ secrets.KEYSTORE_BASE64 != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Decode and verify keystore
        if: env.HAS_SIGNING == 'true'
        env:
          KS_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          # strip any whitespace/newlines/quotes the paste may have picked up
          CLEAN=$(printf '%s' "$KS_B64" | tr -d '[:space:]"'"'")
          printf '%s' "$CLEAN" | base64 -d > keystore.jks 2>/dev/null \
            || printf '%s' "$CLEAN" | base64 -di > keystore.jks
          # verify it is a real keystore and the password opens it —
          # fails HERE with a clear message instead of mid-build
          keytool -list -keystore keystore.jks -storepass "$KS_PASS" > /dev/null
          echo "Keystore decoded and verified OK"

      - name: Build release APK
        env:
          SIGNING_KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk NovaLox-${{ github.ref_name }}.apk

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: NovaLox-${{ github.ref_name }}.apk
          generate_release_notes: true
